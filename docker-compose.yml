
services:
  bot:
    build: .
    env_file: .env
    restart: always
    depends_on:
      - postgres
      - redis
    # Если сервер в РФ и нужен прокси, мы задаем его ТОЛЬКО здесь, 
    # не загрязняя код Python.
    environment:
      - HTTP_PROXY=socks5://proxy-server-ip:port
      - HTTPS_PROXY=socks5://proxy-server-ip:port

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data: